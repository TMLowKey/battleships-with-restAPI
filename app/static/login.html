<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Battleship Login</title>
        <link rel="stylesheet" href="/ui/style.css" />
        <link rel="icon" href="/ui/favicon.ico" sizes="any" />
        <link rel="icon" href="/ui/favicon-32x32.png" type="image/png" />
    </head>
    <body>
        <main class="page">
            <header class="lang-bar">
                <label for="language-select" data-i18n="language.label"
                    >Language</label
                >
                <select id="language-select" aria-label="Language selector">
                    <option value="en">English</option>
                    <option value="cs">Čeština</option>
                </select>
            </header>

            <section class="screen centered">
                <div class="card title-card">
                    <h1>Battleship</h1>
                    <p data-i18n="welcome.subtitle">
                        Welcome captain. Sign in to continue.
                    </p>
                    <form id="welcome-form" class="stack-form">
                        <label for="username" data-i18n="welcome.username"
                            >Username</label
                        >
                        <input
                            id="username"
                            name="username"
                            required
                            minlength="3"
                            maxlength="100"
                            placeholder="e.g. alice"
                            data-i18n-placeholder="welcome.usernamePlaceholder"
                        />
                        <label for="password" data-i18n="welcome.password"
                            >Password</label
                        >
                        <input
                            id="password"
                            name="password"
                            type="password"
                            required
                            minlength="8"
                            maxlength="200"
                            placeholder="at least 8 characters"
                            data-i18n-placeholder="welcome.passwordPlaceholder"
                        />
                        <div class="actions">
                            <button type="submit" data-i18n="welcome.login">
                                Sign In
                            </button>
                            <button
                                id="register-btn"
                                class="ghost"
                                type="button"
                                data-i18n="welcome.register"
                            >
                                Sign Up
                            </button>
                        </div>
                    </form>
                    <p id="auth-message" class="muted"></p>
                </div>
            </section>
        </main>

        <script src="/ui/login.js?v=1"></script>
    </body>
</html>
